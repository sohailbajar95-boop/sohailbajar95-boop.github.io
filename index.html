<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sohail Website</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

header{
    background:#222;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#444;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:10px;
    text-decoration:none;
    font-size:18px;
}

nav a:hover{
    color:yellow;
}

.container{
    padding:40px;
    text-align:center;
}

.card{
    background:white;
    padding:20px;
    margin:20px auto;
    width:60%;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
    padding:12px 25px;
    background:green;
    color:white;
    border:none;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}

</style>
</head>

<body>

<header>
<h1>Welcome to Sohail's Website</h1>
<p>My First Personal Website</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<div class="card">
<h2>About Me</h2>
<p>Hello! My name is Sohail. I am learning coding and website development.</p>
</div>

<div class="card">
<h2>My Goal</h2>
<p>I want to become a strong and successful person and learn technology.</p>
</div>

<div class="card">
<h2>Click Button</h2>
<button onclick="showMessage()">Click Me</button>
</div>

</div>

<footer>
<p>© 2026 Sohail Website</p>
</footer>

<script>

function showMessage(){
    alert("Thanks for visiting Sohail's Website!");
}

</script>

</body>
</html>
